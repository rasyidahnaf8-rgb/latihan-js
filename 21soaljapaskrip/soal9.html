<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <font size ="200px" color="green">
            <h1>
                BUKA DI CONSOLE
            </h1>

        </font>
    </center>

    <script>
        let p = parseFloat(prompt("Masukkan panjang:"));
        let l = parseFloat(prompt("Masukkan lebar:"));


        let luas = p * l;
        let keliling = 2 * (p + l);


        console.log("Panjang:", p);
        console.log("Lebar:", l);
        console.log("Luas:", luas);
        console.log("Keliling:", keliling);

        alert(
            "Panjang: " + p +
            "\nLebar: " + l +
            "\nLuas: " + luas +
            "\nKeliling: " + keliling
        );
    </script>
</body>
</html>
