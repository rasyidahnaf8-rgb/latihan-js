<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <center>
      <font color="green">
        <h1>BUKA DI CONSOLE</h1>
      </font>
    </center>

    <script>
      // input
      let huruf = prompt("Masukkan huruf:");

      // ubah ke huruf kecil biar gampang dicek
      huruf = huruf.toLowerCase();

      // cek
      if (huruf >= "a" && huruf <= "z") {
        if (
          huruf === "a" ||
          huruf === "i" ||
          huruf === "u" ||
          huruf === "e" ||
          huruf === "o"
        ) {
          alert("Huruf vokal");
        } else {
          alert("Huruf konsonan");
        }
      } else {
        alert("Bukan huruf");
      }
    </script>
  </body>
</html>
