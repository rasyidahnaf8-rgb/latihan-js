<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <center>
      <font color="green">
        <h1>BUKA DI CONSOLE</h1>
      </font>
    </center>

    <script>
      let nilai = prompt("masukan nilai anda :");
      if (nilai >= 90) {
        console.log("A");
        alert("A");
      } else if (nilai >= 80) {
        console.log("B");
        alert("B");
      } else if (nilai >= 70) {
        console.log("C");
        alert("C");
      } else if (nilai >= 60) {
        console.log("D");
        alert("D");
      } else {
        console.log("E");
        alert("E");
      }
    </script>
  </body>
</html>
