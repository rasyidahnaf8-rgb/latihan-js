<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <center>
        <font size ="200px" color="green">
            <h1>
                BUKA DI CONSOLE
            </h1>

        </font>
    </center>
    <script>
        let harga = parseInt(prompt("Masukkan harga makanan:"));

        let pajak = harga * 10 / 100;
        let fee = harga * 5 / 100;
        let total = harga + pajak + fee;

        console.log("Harga Makanan:", harga);
        console.log("Pajak:", pajak);
        console.log("Fee:", fee);
        console.log("Total:", total);   
    </script>
</body>
</html>
