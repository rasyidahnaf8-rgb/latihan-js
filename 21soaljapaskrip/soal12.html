<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <font size ="200px" color="green">
            <h1>
                BUKA DI CONSOLE
            </h1>

        </font>
    </center>

    <script>
        let r = parseFloat(prompt("Masukkan jari-jari:"));

        let pi = 3.14;

        let volume = (4/3) * pi * r * r * r;
        let luas = 4 * pi * r * r;

        console.log("Volume:", volume);
        console.log("Luas Permukaan:", luas);
        alert("Volume: " + volume + "\nLuas Permukaan: " + luas);

    </script>
</body>
</html>
